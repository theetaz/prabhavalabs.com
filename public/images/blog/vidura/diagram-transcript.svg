<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>
  <rect width="920" height="430" fill="#050508"/>

  <text x="30" y="40" fill="#ffffff" font-size="19" font-weight="600">Getting the transcript</text>

  <!-- VPS box -->
  <rect x="30" y="80" width="180" height="70" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="120" y="110" fill="#ffffff" font-size="15" text-anchor="middle">Vidura server</text>
  <text x="120" y="132" fill="#ffffff" fill-opacity="0.45" font-size="12.5" text-anchor="middle">VPS, datacenter IP</text>

  <!-- blocked path -->
  <path d="M 210 100 C 330 60, 500 60, 640 92" fill="none" stroke="#f87171" stroke-opacity="0.75" stroke-width="1.8" stroke-dasharray="7 6" marker-end="url(#arrowRed)"/>
  <text x="420" y="58" fill="#f87171" fill-opacity="0.9" font-size="13" text-anchor="middle">direct request: bot check, blocked</text>

  <!-- proxy path -->
  <path d="M 210 130 L 320 130" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="330" y="100" width="200" height="70" rx="14" fill="none" stroke="#a78bfa" stroke-opacity="0.8" stroke-width="1.5"/>
  <text x="430" y="130" fill="#ffffff" font-size="15" text-anchor="middle">yt-dlp</text>
  <text x="430" y="152" fill="#ffffff" fill-opacity="0.45" font-size="12.5" text-anchor="middle">residential proxy</text>
  <path d="M 530 130 L 640 130" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- YouTube box -->
  <rect x="650" y="80" width="240" height="90" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="770" y="112" fill="#ffffff" font-size="15" text-anchor="middle">YouTube caption track</text>
  <text x="770" y="136" fill="#6ee7b7" font-size="12.5" text-anchor="middle">frame-accurate timestamps</text>
  <text x="770" y="156" fill="#ffffff" fill-opacity="0.45" font-size="12.5" text-anchor="middle">source: "YouTube captions"</text>

  <!-- fallback -->
  <path d="M 120 150 L 120 250 L 320 250" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.6" stroke-dasharray="4 5" marker-end="url(#arrow)"/>
  <text x="132" y="222" fill="#ffffff" fill-opacity="0.55" font-size="12.5">no proxy, or no captions</text>

  <rect x="330" y="215" width="200" height="70" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="430" y="245" fill="#ffffff" font-size="15" text-anchor="middle">Gemini audio ASR</text>
  <text x="430" y="267" fill="#ffffff" fill-opacity="0.45" font-size="12.5" text-anchor="middle">timestamps within ±3 s</text>

  <path d="M 530 250 L 640 250" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="650" y="215" width="240" height="70" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="770" y="245" fill="#ffffff" font-size="15" text-anchor="middle">transcript, lower fidelity</text>
  <text x="770" y="267" fill="#fcd34d" font-size="12.5" text-anchor="middle">source: "AI transcribed"</text>

  <!-- provenance note -->
  <rect x="30" y="330" width="860" height="66" rx="14" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1"/>
  <text x="50" y="358" fill="#ffffff" fill-opacity="0.8" font-size="13.5">Whichever path ran, the video wears it openly: a provenance badge and a computed sync score,</text>
  <text x="50" y="378" fill="#ffffff" fill-opacity="0.8" font-size="13.5">so nobody has to guess whether the subtitles can be trusted.</text>
</svg>
